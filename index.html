<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IT Ticketing System</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body class="bg-gray-50 font-sans">

<div id="root"></div>

<script>
// ================================================================
// ✏️  SETTINGS — Edit this section to customize your system
// ================================================================
const CONFIG = {
  title: 'IT Ticketing System',
};

// ================================================================
// ✏️  DEFAULT USERS — Add or edit users here
//     Roles: 'admin', 'agent', 'user'
//     Password is plain text — users can be changed in Admin > Users
// ================================================================
const DEFAULT_USERS = [
  { id: '1', name: 'System Admin',   email: 'admin@company.com',  password: 'Admin123!', role: 'admin', dept: 'IT',           active: true },
  { id: '2', name: 'Sarah Johnson',  email: 'agent@company.com',  password: 'Agent123!', role: 'agent', dept: 'IT Support',   active: true },
  { id: '3', name: 'Alice Williams', email: 'user@company.com',   password: 'User123!',  role: 'user',  dept: 'Finance',      active: true },
];

// ================================================================
// ✏️  CATEGORIES — Edit ticket categories here
// ================================================================
const DEFAULT_CATEGORIES = [
  { id: '1', name: 'IT General', icon: '💻', color: '#6366f1' },
  { id: '2', name: 'Network',    icon: '🌐', color: '#0ea5e9' },
  { id: '3', name: 'Software',   icon: '⚙️', color: '#10b981' },
  { id: '4', name: 'Hardware',   icon: '🖥️', color: '#f59e0b' },
  { id: '5', name: 'Other',      icon: '📋', color: '#8b5cf6' },
];

// ================================================================
// STORAGE — Data saved in browser localStorage
// ================================================================
const Storage = {
  get: (key, def) => {
    try { const v = localStorage.getItem(key); return v !== null ? JSON.parse(v) : def; }
    catch { return def; }
  },
  set: (key, val) => localStorage.setItem(key, JSON.stringify(val)),
};

function initStorage() {
  if (Storage.get('users', null) === null)      Storage.set('users', DEFAULT_USERS);
  if (Storage.get('categories', null) === null) Storage.set('categories', DEFAULT_CATEGORIES);
  if (Storage.get('tickets', null) === null)    Storage.set('tickets', []);
  if (Storage.get('ticketSeq', null) === null)  Storage.set('ticketSeq', 0);
}

// ================================================================
// AUTH
// ================================================================
let currentUser = null;

function login(email, password) {
  const user = Storage.get('users', []).find(u => u.email === email && u.password === password && u.active);
  if (!user) return false;
  currentUser = user;
  sessionStorage.setItem('cu', JSON.stringify(user));
  return true;
}

function logout() {
  currentUser = null;
  sessionStorage.removeItem('cu');
  render('login');
}

function restoreSession() {
  const s = sessionStorage.getItem('cu');
  if (s) { currentUser = JSON.parse(s); return true; }
  return false;
}

const isAdmin = () => currentUser?.role === 'admin';
const isAgent = () => currentUser?.role === 'agent' || currentUser?.role === 'admin';

// ================================================================
// DATA HELPERS
// ================================================================
const getTickets    = () => Storage.get('tickets', []);
const getUsers      = () => Storage.get('users', []);
const getCategories = () => Storage.get('categories', []);

function createTicket(data) {
  const seq = Storage.get('ticketSeq', 0) + 1;
  Storage.set('ticketSeq', seq);
  const ticket = {
    id: Date.now().toString(),
    number: 'TKT-' + String(seq).padStart(4, '0'),
    title: data.title,
    description: data.description,
    status: 'open',
    priority: data.priority || 'medium',
    category: data.category || '1',
    requesterId: currentUser.id,
    requesterName: currentUser.name,
    requesterEmail: currentUser.email,
    assigneeId: data.assigneeId || null,
    comments: [],
    createdAt: new Date().toISOString(),
    updatedAt: new Date().toISOString(),
  };
  const tickets = getTickets();
  tickets.push(ticket);
  Storage.set('tickets', tickets);
  return ticket;
}

function updateTicket(id, updates) {
  const tickets = getTickets();
  const i = tickets.findIndex(t => t.id === id);
  if (i === -1) return null;
  tickets[i] = { ...tickets[i], ...updates, updatedAt: new Date().toISOString() };
  Storage.set('tickets', tickets);
  return tickets[i];
}

function addComment(ticketId, body, isInternal) {
  const tickets = getTickets();
  const ticket = tickets.find(t => t.id === ticketId);
  if (!ticket) return;
  ticket.comments = ticket.comments || [];
  ticket.comments.push({
    id: Date.now().toString(),
    authorId: currentUser.id,
    authorName: currentUser.name,
    body, isInternal,
    createdAt: new Date().toISOString(),
  });
  ticket.updatedAt = new Date().toISOString();
  Storage.set('tickets', tickets);
}

// ================================================================
// UTILITIES
// ================================================================
function formatDate(iso) {
  if (!iso) return '';
  return new Date(iso).toLocaleDateString('en-US', { month:'short', day:'numeric', year:'numeric', hour:'2-digit', minute:'2-digit' });
}

function timeAgo(iso) {
  const m = Math.floor((Date.now() - new Date(iso)) / 60000);
  if (m < 1) return 'just now';
  if (m < 60) return m + 'm ago';
  if (m < 1440) return Math.floor(m/60) + 'h ago';
  return Math.floor(m/1440) + 'd ago';
}

const STATUS_LABELS = { open:'Open', in_progress:'In Progress', pending:'Pending', resolved:'Resolved', closed:'Closed' };
const STATUS_COLORS = { open:'bg-blue-100 text-blue-700', in_progress:'bg-yellow-100 text-yellow-700', pending:'bg-orange-100 text-orange-700', resolved:'bg-green-100 text-green-700', closed:'bg-slate-100 text-slate-500' };
const PRIORITY_COLORS = { low:'bg-slate-100 text-slate-600', medium:'bg-blue-100 text-blue-700', high:'bg-orange-100 text-orange-700', critical:'bg-red-100 text-red-700' };

const badge = (label, cls) => `<span class="px-2 py-0.5 rounded-full text-xs font-semibold ${cls}">${label}</span>`;
const avatar = (name, size='w-7 h-7') => `<div class="${size} rounded-full bg-indigo-100 flex items-center justify-center text-indigo-600 font-bold text-xs flex-shrink-0">${name.charAt(0)}</div>`;

// ================================================================
// ROUTER
// ================================================================
let currentPage = 'dashboard';
let currentTicketId = null;

function render(page, params = {}) {
  currentPage = page;
  if (params.ticketId) currentTicketId = params.ticketId;
  const root = document.getElementById('root');

  if (page === 'login') {
    root.innerHTML = renderLogin();
    bindLogin();
    return;
  }

  root.innerHTML = renderShell(getPageContent(page, params));
  bindNav();
  bindPageEvents(page, params);
}

function getPageContent(page, params) {
  switch (page) {
    case 'dashboard':  return renderDashboard();
    case 'tickets':    return renderTicketList(params);
    case 'new-ticket': return renderNewTicket();
    case 'ticket':     return renderTicketDetail(params.ticketId);
    case 'reports':    return renderReports();
    case 'users':      return renderUsers();
    default:           return renderDashboard();
  }
}

// ================================================================
// SHELL / LAYOUT
// ================================================================
function renderShell(content) {
  const links = [
    { page:'dashboard',  label:'Dashboard',  icon:'📊' },
    { page:'tickets',    label:'Tickets',     icon:'🎫' },
    { page:'new-ticket', label:'New Ticket',  icon:'➕' },
    ...(isAgent() ? [{ page:'reports', label:'Reports', icon:'📈' }] : []),
    ...(isAdmin() ? [{ page:'users',   label:'Users',   icon:'👥' }] : []),
  ];

  return `
    <div class="flex h-screen overflow-hidden">
      <!-- Sidebar -->
      <aside class="w-56 bg-slate-900 flex flex-col flex-shrink-0">
        <div class="p-4 border-b border-slate-700">
          <div class="flex items-center gap-2">
            <div class="w-8 h-8 bg-indigo-600 rounded-lg flex items-center justify-center text-white font-bold text-xs">IT</div>
            <div class="text-white font-semibold text-sm leading-snug">IT Ticketing<br><span class="text-slate-400 font-normal text-xs">System</span></div>
          </div>
        </div>
        <nav class="flex-1 p-3 space-y-1">
          ${links.map(l => `
            <a href="#" data-page="${l.page}" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium transition-all
              ${currentPage === l.page ? 'bg-indigo-600 text-white' : 'text-slate-300 hover:bg-slate-700 hover:text-white'}">
              <span>${l.icon}</span><span>${l.label}</span>
            </a>`).join('')}
        </nav>
        <div class="p-3 border-t border-slate-700">
          <div class="flex items-center gap-2 px-2 py-2">
            ${avatar(currentUser.name, 'w-7 h-7')}
            <div class="flex-1 min-w-0">
              <div class="text-white text-xs font-medium truncate">${currentUser.name}</div>
              <div class="text-slate-400 text-xs capitalize">${currentUser.role}</div>
            </div>
            <button id="btn-logout" title="Sign Out" class="text-slate-400 hover:text-white text-base leading-none">⏏</button>
          </div>
        </div>
      </aside>
      <!-- Main -->
      <main class="flex-1 overflow-auto bg-slate-50">
        ${content}
      </main>
    </div>`;
}

// ================================================================
// LOGIN PAGE
// ================================================================
function renderLogin() {
  return `
    <div class="min-h-screen bg-gradient-to-br from-slate-900 via-indigo-950 to-slate-900 flex items-center justify-center p-4">
      <div class="bg-white rounded-2xl shadow-2xl p-8 w-full max-w-md">
        <div class="text-center mb-8">
          <div class="w-14 h-14 bg-indigo-600 rounded-2xl flex items-center justify-center mx-auto mb-4 text-2xl">🎫</div>
          <h1 class="text-2xl font-bold text-slate-900">IT Ticketing System</h1>
          <p class="text-slate-500 text-sm mt-1">Sign in to continue</p>
        </div>
        <form id="login-form" class="space-y-4">
          <div>
            <label class="block text-sm font-medium text-slate-700 mb-1">Email</label>
            <input id="login-email" type="email" required placeholder="you@company.com"
              class="w-full border border-slate-300 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500"/>
          </div>
          <div>
            <label class="block text-sm font-medium text-slate-700 mb-1">Password</label>
            <input id="login-password" type="password" required placeholder="••••••••"
              class="w-full border border-slate-300 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500"/>
          </div>
          <div id="login-error" class="hidden text-red-500 text-sm text-center bg-red-50 p-2 rounded-lg"></div>
          <button type="submit"
            class="w-full bg-indigo-600 text-white rounded-lg py-2.5 font-semibold text-sm hover:bg-indigo-700 transition-colors">
            Sign In
          </button>
        </form>
        <!-- Sample Accounts -->
        <div class="mt-6 p-4 bg-slate-50 rounded-xl">
          <p class="text-xs font-semibold text-slate-400 mb-2 uppercase tracking-wide">Quick login</p>
          <div class="space-y-1">
            ${DEFAULT_USERS.map(u => `
              <button type="button" onclick="quickFill('${u.email}','${u.password}')"
                class="w-full text-left flex justify-between items-center px-2 py-1.5 rounded hover:bg-white transition-colors">
                <span class="font-mono text-xs text-slate-600">${u.email}</span>
                <span class="text-xs text-indigo-500 font-semibold capitalize">${u.role}</span>
              </button>`).join('')}
          </div>
        </div>
      </div>
    </div>`;
}

function quickFill(email, password) {
  document.getElementById('login-email').value = email;
  document.getElementById('login-password').value = password;
}

function bindLogin() {
  document.getElementById('login-form').addEventListener('submit', e => {
    e.preventDefault();
    const ok = login(
      document.getElementById('login-email').value,
      document.getElementById('login-password').value
    );
    if (ok) {
      render('dashboard');
    } else {
      const err = document.getElementById('login-error');
      err.textContent = 'Invalid email or password. Please try again.';
      err.classList.remove('hidden');
    }
  });
}

// ================================================================
// DASHBOARD PAGE
// ================================================================
function renderDashboard() {
  const all = getTickets();
  const tickets = isAgent() ? all : all.filter(t => t.requesterId === currentUser.id);
  const cats = getCategories();

  const stats = [
    { label:'Open',        val: tickets.filter(t=>t.status==='open').length,        icon:'🔵', bg:'bg-blue-50',   text:'text-blue-600'   },
    { label:'In Progress', val: tickets.filter(t=>t.status==='in_progress').length, icon:'🟡', bg:'bg-yellow-50', text:'text-yellow-600' },
    { label:'Resolved',    val: tickets.filter(t=>t.status==='resolved').length,    icon:'🟢', bg:'bg-green-50',  text:'text-green-600'  },
    { label:'Total',       val: tickets.length,                                      icon:'📋', bg:'bg-slate-50',  text:'text-slate-600'  },
  ];

  const recent = [...tickets].sort((a,b) => new Date(b.createdAt)-new Date(a.createdAt)).slice(0,6);

  return `
    <div class="p-6 max-w-5xl">
      <div class="mb-6">
        <h1 class="text-2xl font-bold text-slate-900">Dashboard</h1>
        <p class="text-slate-500 text-sm mt-1">Welcome back, ${currentUser.name} 👋</p>
      </div>

      <!-- Stats -->
      <div class="grid grid-cols-2 lg:grid-cols-4 gap-4 mb-8">
        ${stats.map(s => `
          <div class="bg-white rounded-xl p-5 shadow-sm border border-slate-100">
            <div class="flex items-center justify-between mb-3">
              <span class="text-slate-500 text-sm font-medium">${s.label}</span>
              <span class="text-xl">${s.icon}</span>
            </div>
            <div class="text-3xl font-bold text-slate-900">${s.val}</div>
          </div>`).join('')}
      </div>

      <!-- Recent Tickets -->
      <div class="bg-white rounded-xl shadow-sm border border-slate-100">
        <div class="px-5 py-4 border-b border-slate-100 flex justify-between items-center">
          <h2 class="font-semibold text-slate-900">Recent Tickets</h2>
          <a href="#" data-page="tickets" class="text-sm text-indigo-600 hover:underline">View all →</a>
        </div>
        ${recent.length === 0
          ? `<div class="p-10 text-center text-slate-400 text-sm">No tickets yet. <a href="#" data-page="new-ticket" class="text-indigo-500 hover:underline">Create your first ticket →</a></div>`
          : `<div class="divide-y divide-slate-50">
              ${recent.map(t => {
                const cat = cats.find(c => c.id === t.category);
                return `
                  <div class="px-5 py-4 hover:bg-slate-50 cursor-pointer transition-colors" onclick="render('ticket',{ticketId:'${t.id}'})">
                    <div class="flex items-center justify-between gap-3">
                      <div class="flex-1 min-w-0">
                        <div class="font-medium text-slate-800 text-sm truncate">${t.title}</div>
                        <div class="flex items-center gap-2 mt-1">
                          <span class="font-mono text-xs text-slate-400">${t.number}</span>
                          ${cat ? `<span class="text-xs text-slate-400">${cat.icon} ${cat.name}</span>` : ''}
                          <span class="text-xs text-slate-400">${timeAgo(t.createdAt)}</span>
                        </div>
                      </div>
                      <div class="flex gap-1.5 flex-shrink-0">
                        ${badge(STATUS_LABELS[t.status]||t.status, STATUS_COLORS[t.status]||'')}
                        ${badge(t.priority.charAt(0).toUpperCase()+t.priority.slice(1), PRIORITY_COLORS[t.priority]||'')}
                      </div>
                    </div>
                  </div>`;
              }).join('')}
            </div>`}
      </div>
    </div>`;
}

// ================================================================
// TICKET LIST PAGE
// ================================================================
function renderTicketList(params = {}) {
  const all = getTickets();
  const cats = getCategories();
  const fs = params.status || '', fp = params.priority || '', fq = params.search || '';

  let list = isAgent() ? all : all.filter(t => t.requesterId === currentUser.id);
  if (fs) list = list.filter(t => t.status === fs);
  if (fp) list = list.filter(t => t.priority === fp);
  if (fq) list = list.filter(t => t.title.toLowerCase().includes(fq.toLowerCase()) || t.number.toLowerCase().includes(fq.toLowerCase()));
  list = [...list].sort((a,b) => new Date(b.createdAt)-new Date(a.createdAt));

  return `
    <div class="p-6">
      <div class="flex items-center justify-between mb-6">
        <h1 class="text-2xl font-bold text-slate-900">${isAgent() ? 'All Tickets' : 'My Tickets'}</h1>
        <a href="#" data-page="new-ticket" class="bg-indigo-600 text-white px-4 py-2 rounded-lg text-sm font-semibold hover:bg-indigo-700 transition-colors">
          + New Ticket
        </a>
      </div>

      <!-- Filters -->
      <div class="bg-white rounded-xl shadow-sm border border-slate-100 p-4 mb-4 flex flex-wrap gap-3 items-center">
        <input id="f-search" type="text" placeholder="Search tickets…" value="${fq}"
          class="border border-slate-200 rounded-lg px-3 py-2 text-sm flex-1 min-w-36 focus:outline-none focus:ring-2 focus:ring-indigo-500"/>
        <select id="f-status" class="border border-slate-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500">
          <option value="">All Statuses</option>
          ${Object.entries(STATUS_LABELS).map(([v,l]) => `<option value="${v}" ${fs===v?'selected':''}>${l}</option>`).join('')}
        </select>
        <select id="f-priority" class="border border-slate-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500">
          <option value="">All Priorities</option>
          ${['low','medium','high','critical'].map(p => `<option value="${p}" ${fp===p?'selected':''}>${p.charAt(0).toUpperCase()+p.slice(1)}</option>`).join('')}
        </select>
        <button id="btn-filter" class="bg-indigo-600 text-white px-4 py-2 rounded-lg text-sm font-semibold hover:bg-indigo-700 transition-colors">
          Filter
        </button>
      </div>

      <!-- Table -->
      <div class="bg-white rounded-xl shadow-sm border border-slate-100 overflow-hidden">
        ${list.length === 0
          ? `<div class="p-12 text-center text-slate-400">No tickets found.</div>`
          : `<table class="w-full text-sm">
              <thead class="bg-slate-50 border-b border-slate-100">
                <tr>
                  <th class="text-left px-4 py-3 text-xs font-semibold text-slate-500 uppercase">Ticket</th>
                  <th class="text-left px-4 py-3 text-xs font-semibold text-slate-500 uppercase">Status</th>
                  <th class="text-left px-4 py-3 text-xs font-semibold text-slate-500 uppercase">Priority</th>
                  <th class="text-left px-4 py-3 text-xs font-semibold text-slate-500 uppercase hidden md:table-cell">Category</th>
                  ${isAgent() ? '<th class="text-left px-4 py-3 text-xs font-semibold text-slate-500 uppercase hidden lg:table-cell">Requester</th>' : ''}
                  <th class="text-left px-4 py-3 text-xs font-semibold text-slate-500 uppercase hidden lg:table-cell">Created</th>
                </tr>
              </thead>
              <tbody class="divide-y divide-slate-50">
                ${list.map(t => {
                  const cat = cats.find(c => c.id === t.category);
                  return `
                    <tr class="hover:bg-slate-50 cursor-pointer transition-colors" onclick="render('ticket',{ticketId:'${t.id}'})">
                      <td class="px-4 py-3">
                        <div class="font-medium text-slate-800">${t.title}</div>
                        <div class="text-xs text-slate-400 font-mono">${t.number}</div>
                      </td>
                      <td class="px-4 py-3">${badge(STATUS_LABELS[t.status]||t.status, STATUS_COLORS[t.status]||'')}</td>
                      <td class="px-4 py-3">${badge(t.priority.charAt(0).toUpperCase()+t.priority.slice(1), PRIORITY_COLORS[t.priority]||'')}</td>
                      <td class="px-4 py-3 text-slate-600 hidden md:table-cell">${cat ? cat.icon+' '+cat.name : '—'}</td>
                      ${isAgent() ? `<td class="px-4 py-3 text-slate-600 hidden lg:table-cell">${t.requesterName}</td>` : ''}
                      <td class="px-4 py-3 text-slate-400 hidden lg:table-cell">${timeAgo(t.createdAt)}</td>
                    </tr>`;
                }).join('')}
              </tbody>
            </table>`}
      </div>
    </div>`;
}

// ================================================================
// NEW TICKET PAGE
// ================================================================
function renderNewTicket() {
  const cats = getCategories();
  const agents = getUsers().filter(u => (u.role === 'agent' || u.role === 'admin') && u.active);

  return `
    <div class="p-6 max-w-2xl">
      <button onclick="render('tickets')" class="text-slate-500 hover:text-slate-700 text-sm mb-4">← Back to Tickets</button>
      <h1 class="text-2xl font-bold text-slate-900 mb-6">New Ticket</h1>

      <div class="bg-white rounded-xl shadow-sm border border-slate-100 p-6">
        <form id="new-ticket-form" class="space-y-5">
          <div>
            <label class="block text-sm font-medium text-slate-700 mb-1">Title <span class="text-red-500">*</span></label>
            <input id="nt-title" type="text" required placeholder="Brief description of the issue"
              class="w-full border border-slate-300 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500"/>
          </div>
          <div>
            <label class="block text-sm font-medium text-slate-700 mb-1">Description <span class="text-red-500">*</span></label>
            <textarea id="nt-desc" required rows="5" placeholder="Describe the problem in detail..."
              class="w-full border border-slate-300 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 resize-none"></textarea>
          </div>
          <div class="grid grid-cols-2 gap-4">
            <div>
              <label class="block text-sm font-medium text-slate-700 mb-1">Category</label>
              <select id="nt-cat" class="w-full border border-slate-300 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500">
                ${cats.map(c => `<option value="${c.id}">${c.icon} ${c.name}</option>`).join('')}
              </select>
            </div>
            <div>
              <label class="block text-sm font-medium text-slate-700 mb-1">Priority</label>
              <select id="nt-priority" class="w-full border border-slate-300 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500">
                <option value="low">Low</option>
                <option value="medium" selected>Medium</option>
                <option value="high">High</option>
                <option value="critical">Critical</option>
              </select>
            </div>
          </div>
          ${isAgent() ? `
          <div>
            <label class="block text-sm font-medium text-slate-700 mb-1">Assign To</label>
            <select id="nt-assignee" class="w-full border border-slate-300 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500">
              <option value="">Unassigned</option>
              ${agents.map(a => `<option value="${a.id}">${a.name}</option>`).join('')}
            </select>
          </div>` : ''}
          <div class="flex gap-3 pt-2">

function renderTicketDetail(ticketId) {

  const users   = getUsers();
  const cat     = cats.find(c => c.id === ticket.category);

  const agents  = users.filter(u => (u.role === 'agent' || u.role === 'admin') && u.active);

  return `

      <button onclick="render('tickets')" class="text-slate-500 hover:text-slate-700 text-sm mb-4">← Back to Tickets</button>

      <div class="grid grid-cols-1 lg:grid-cols-3 gap-6 max-w-5xl">

            </div>
            <div class="text-sm text-slate-600 whitespace-pre-wrap border-t border-slate-100 pt-4">${ticket.description}</div>
          </div>

          <!-- Comments -->

            <div class="px-5 py-4 border-b border-slate-100">
              <h2 class="font-semibold text-slate-900">Comments <span class="text-slate-400 font-normal">(${(ticket.comments||[]).length})</span></h2>

            <!-- Add Comment -->
            <div class="px-5 py-4 border-t border-slate-100 bg-slate-50 rounded-b-xl">
              <textarea id="comment-body" rows="3" placeholder="Write a comment…"
                class="w-full border border-slate-200 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 resize-none mb-3 bg-white"></textarea>
              <div class="flex gap-2">
                <button id="btn-comment" data-id="${ticket.id}"
                  class="bg-indigo-600 text-white px-4 py-2 rounded-lg text-sm font-semibold hover:bg-indigo-700 transition-colors">

                </select>
              </div>
              <div>
                <label class="block text-xs font-medium text-slate-500 mb-1">Assign To</label>
                <select id="edit-assignee" class="w-full border border-slate-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500">
                  <option value="">Unassigned</option>
                  ${agents.map(a => `<option value="${a.id}" ${ticket.assigneeId===a.id?'selected':''}>${a.name}</option>`).join('')}

function initCharts() {
  const tickets   = getTickets();
  const cats      = getCategories();
  const byStatus  = Object.keys(STATUS_LABELS).map(s => tickets.filter(t => t.status === s).length);
  const byPrio    = ['low','medium','high','critical'].map(p => tickets.filter(t => t.priority === p).length);
  const byCat     = cats.map(c => tickets.filter(t => t.category === c.id).length);

  const days = Array.from({length:7}, (_,i) => {
    const d = new Date(); d.setDate(d.getDate()-(6-i));
    return d.toLocaleDateString('en-US', {month:'short', day:'numeric'});
  });
  const perDay = Array.from({length:7}, (_,i) => {
    const d = new Date(); d.setDate(d.getDate()-(6-i));
    return tickets.filter(t => new Date(t.createdAt).toDateString() === d.toDateString()).length;
  });

  const opts = { responsive:true, plugins:{ legend:{ position:'bottom', labels:{ boxWidth:12, font:{size:11} } } } };

  new Chart(document.getElementById('chart-status'), {
    type:'doughnut',
    data:{ labels:Object.values(STATUS_LABELS), datasets:[{ data:byStatus, backgroundColor:['#3b82f6','#eab308','#f97316','#22c55e','#94a3b8'], borderWidth:0 }] },
    options: opts,
  });
  new Chart(document.getElementById('chart-priority'), {
    type:'bar',
    data:{ labels:['Low','Medium','High','Critical'], datasets:[{ data:byPrio, backgroundColor:['#94a3b8','#3b82f6','#f97316','#ef4444'], borderRadius:4, borderSkipped:false }] },
    options:{ ...opts, plugins:{ legend:{display:false} }, scales:{ y:{ beginAtZero:true, ticks:{stepSize:1} } } },
  });
  new Chart(document.getElementById('chart-days'), {
    type:'line',
    data:{ labels:days, datasets:[{ label:'Tickets', data:perDay, borderColor:'#6366f1', backgroundColor:'rgba(99,102,241,0.08)', fill:true, tension:0.4, pointRadius:3 }] },
    options:{ ...opts, plugins:{ legend:{display:false} }, scales:{ y:{ beginAtZero:true, ticks:{stepSize:1} } } },
  });
  new Chart(document.getElementById('chart-cat'), {
    type:'doughnut',
    data:{ labels:cats.map(c=>c.name), datasets:[{ data:byCat, backgroundColor:cats.map(c=>c.color), borderWidth:0 }] },
    options: opts,
  });
}

// ================================================================
// GLOBAL INLINE-ONCLICK FUNCTIONS
// ================================================================
function changeUserRole(userId, role) {
  const users = getUsers();
  const u = users.find(u => u.id === userId);
  if (u) { u.role = role; Storage.set('users', users); }
}

function toggleUserActive(userId) {
  const users = getUsers();
  const u = users.find(u => u.id === userId);
  if (u) { u.active = !u.active; Storage.set('users', users); render('users'); }
}

// ================================================================
// EVENT BINDING
// ================================================================
function bindNav() {
  document.querySelectorAll('[data-page]').forEach(el => {
    el.addEventListener('click', e => { e.preventDefault(); render(el.dataset.page); });
  });
  document.getElementById('btn-logout')?.addEventListener('click', logout);
}

function bindPageEvents(page, params) {
  if (page === 'tickets') {
    document.getElementById('btn-filter')?.addEventListener('click', () => {
      render('tickets', {
        search:   document.getElementById('f-search').value,
        status:   document.getElementById('f-status').value,
        priority: document.getElementById('f-priority').value,
      });
    });
    document.getElementById('f-search')?.addEventListener('keydown', e => {
      if (e.key === 'Enter') document.getElementById('btn-filter').click();
    });
  }

  if (page === 'new-ticket') {
    document.getElementById('new-ticket-form')?.addEventListener('submit', e => {
      e.preventDefault();
      const ticket = createTicket({
        title:      document.getElementById('nt-title').value.trim(),
        description:document.getElementById('nt-desc').value.trim(),
        category:   document.getElementById('nt-cat').value,
        priority:   document.getElementById('nt-priority').value,
        assigneeId: document.getElementById('nt-assignee')?.value || null,
      });
      render('ticket', { ticketId: ticket.id });
    });
  }

  if (page === 'ticket') {
    document.getElementById('btn-comment')?.addEventListener('click', () => {
      const body = document.getElementById('comment-body').value.trim();
      if (!body) return;
      addComment(params.ticketId, body, false);
      render('ticket', { ticketId: params.ticketId });
    });
    document.getElementById('btn-internal')?.addEventListener('click', () => {
      const body = document.getElementById('comment-body').value.trim();
      if (!body) return;
      addComment(params.ticketId, body, true);
      render('ticket', { ticketId: params.ticketId });
    });
    document.getElementById('btn-update')?.addEventListener('click', () => {
      updateTicket(params.ticketId, {
        status:     document.getElementById('edit-status').value,
        priority:   document.getElementById('edit-priority').value,
        assigneeId: document.getElementById('edit-assignee').value || null,
      });
      render('ticket', { ticketId: params.ticketId });
    });
  }

  if (page === 'reports') {
    setTimeout(initCharts, 50);
  }

  if (page === 'users') {
    document.getElementById('btn-show-add')?.addEventListener('click', () => {
      document.getElementById('add-user-form').classList.toggle('hidden');
    });
    document.getElementById('btn-cancel-user')?.addEventListener('click', () => {
      document.getElementById('add-user-form').classList.add('hidden');
    });
    document.getElementById('btn-save-user')?.addEventListener('click', () => {
      const name  = document.getElementById('nu-name').value.trim();
      const email = document.getElementById('nu-email').value.trim();
      const pass  = document.getElementById('nu-pass').value.trim();
      const dept  = document.getElementById('nu-dept').value.trim();
      const role  = document.getElementById('nu-role').value;
      if (!name || !email || !pass) { alert('Name, email and password are required.'); return; }
      const users = getUsers();
      if (users.find(u => u.email === email)) { alert('That email already exists.'); return; }
      users.push({ id: Date.now().toString(), name, email, password: pass, dept, role, active: true });
      Storage.set('users', users);
      render('users');
    });
  }
}
