<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IT Ticketing System</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
<style>
  /* Dark mode */
  html.dark body { background:#0f172a; color:#e2e8f0; }
  html.dark .dm-bg   { background:#1e293b !important; }
  html.dark .dm-bg2  { background:#0f172a !important; }
  html.dark .dm-card { background:#1e293b !important; border-color:#334155 !important; }
  html.dark .dm-text { color:#e2e8f0 !important; }
  html.dark .dm-sub  { color:#94a3b8 !important; }
  html.dark .dm-inp  { background:#0f172a !important; border-color:#475569 !important; color:#e2e8f0 !important; }
  html.dark .dm-inp::placeholder { color:#64748b; }
  html.dark .dm-divide > * { border-color:#334155 !important; }
  html.dark .dm-hover:hover { background:#334155 !important; }
  html.dark .dm-sidebar { background:#0f172a !important; }
  html.dark .dm-sidebar-border { border-color:#1e293b !important; }
  html.dark .dm-main { background:#0f172a !important; }
  html.dark .dm-thead { background:#1e293b !important; }
  html.dark .dm-tr:hover { background:#1e293b !important; }
  html.dark .dm-border { border-color:#334155 !important; }
  html.dark .dm-amber { background:#451a03 !important; }

  /* Mouse gradient canvas */
  #mouse-canvas {
    position:fixed; inset:0; pointer-events:none; z-index:999;
    transition:opacity 0.6s ease;
  }

  /* Splash rings */
  .splash-ring {
    position:fixed; border-radius:50%; pointer-events:none; z-index:1000;
    border:2px solid transparent;
    animation:splashAnim 0.7s ease-out forwards;
  }
  @keyframes splashAnim {
    0%   { transform:translate(-50%,-50%) scale(0); opacity:0.9; }
    100% { transform:translate(-50%,-50%) scale(1); opacity:0; }
  }

  /* Custom cursor ring */
  #cursor-ring {
    position:fixed; pointer-events:none; z-index:1002; border-radius:50%;
    width:26px; height:26px; border:1.5px solid rgba(99,102,241,0.7);
    transform:translate(-50%,-50%);
    transition:width 0.12s ease, height 0.12s ease;
  }

  /* Notification panel */
  #notif-panel { animation:notifSlide 0.15s ease-out; }
  @keyframes notifSlide {
    from { opacity:0; transform:translateY(6px); }
    to   { opacity:1; transform:translateY(0); }
  }

  /* SLA badge pulse for overdue */
  .sla-overdue { animation: pulse-red 1.8s infinite; }
  @keyframes pulse-red {
    0%,100% { opacity:1; } 50% { opacity:0.6; }
  }
</style>
</head>
<body class="bg-gray-50 font-sans dm-main">
<canvas id="mouse-canvas"></canvas>
<div id="cursor-ring"></div>
<div id="root"></div>
<script>

// ================================================================
// ✏️  CONFIGURATION
// ================================================================
const CONFIG = {
  title: 'IT Ticketing System',

  // ✏️  EMAIL NOTIFICATIONS (EmailJS — free at https://emailjs.com)
  // Setup steps:
  //   1. Create account at emailjs.com
  //   2. Add an Email Service (Gmail, Outlook, etc.)
  //   3. Create a Template. Use these variables in your template body:
  //        {{to_name}}  {{to_email}}  {{subject}}
  //        {{message}}  {{ticket_number}}  {{ticket_title}}  {{portal_url}}
  //   4. Paste your keys below
  emailJS: {
    publicKey:  '',   // ← Your EmailJS Public Key
    serviceId:  '',   // ← Your Service ID  e.g. 'service_abc123'
    templateId: '',   // ← Your Template ID e.g. 'template_abc123'
  },

  // ✏️  Support email displayed to users
  supportEmail: 'support@yourcompany.com',

  // ✏️  Your live URL (used in notification emails)
  portalUrl: '',  // e.g. 'https://televlog.github.io/it-ticketing-html/'
};

// ================================================================
// ✏️  DEFAULT USERS  (role: 'admin' | 'agent' | 'user')
// ================================================================
const DEFAULT_USERS = [
  { id:'1', name:'System Admin',   email:'admin@company.com',  password:'Admin123!', role:'admin', dept:'IT',         active:true,  deleted:false },
  { id:'2', name:'Sarah Johnson',  email:'agent@company.com',  password:'Agent123!', role:'agent', dept:'IT Support', active:true,  deleted:false },
  { id:'3', name:'Alice Williams', email:'user@company.com',   password:'User123!',  role:'user',  dept:'Finance',    active:true,  deleted:false },
];

// ================================================================
// ✏️  CATEGORIES
// ================================================================
const DEFAULT_CATEGORIES = [
  { id:'1', name:'IT General', icon:'💻', color:'#6366f1' },
  { id:'2', name:'Network',    icon:'🌐', color:'#0ea5e9' },
  { id:'3', name:'Software',   icon:'⚙️', color:'#10b981' },
  { id:'4', name:'Hardware',   icon:'🖥️', color:'#f59e0b' },
  { id:'5', name:'Other',      icon:'📋', color:'#8b5cf6' },
];

// ================================================================
// STORAGE
// ================================================================
const Store = {
  get: (k,d) => { try{const v=localStorage.getItem(k);return v!==null?JSON.parse(v):d}catch{return d} },
  set: (k,v) => localStorage.setItem(k,JSON.stringify(v)),
};

function initStorage() {
  if (Store.get('users',null)        === null) Store.set('users', DEFAULT_USERS);
  if (Store.get('categories',null)   === null) Store.set('categories', DEFAULT_CATEGORIES);
  if (Store.get('tickets',null)      === null) Store.set('tickets', []);
  if (Store.get('ticketSeq',null)    === null) Store.set('ticketSeq', 0);
  if (Store.get('activityLogs',null) === null) Store.set('activityLogs', []);
  // Migrate old users that don't have deleted field
  const users = Store.get('users',[]).map(u => ({ deleted:false, ...u }));
  Store.set('users', users);
}

// ================================================================
// AUTH
// ================================================================
let currentUser = null;

function login(email, password) {
  const user = Store.get('users',[]).find(u =>
    u.email === email && u.password === password && u.active && !u.deleted
  );
  if (!user) return false;
  currentUser = user;
  sessionStorage.setItem('cu', JSON.stringify(user));
  return true;
}

function logout() { currentUser = null; sessionStorage.removeItem('cu'); render('login'); }

function restoreSession() {
  const s = sessionStorage.getItem('cu');
  if (s) {
    const saved = JSON.parse(s);
    const live  = Store.get('users',[]).find(u => u.id === saved.id && u.active && !u.deleted);
    if (live) { currentUser = live; return true; }
    sessionStorage.removeItem('cu');
  }
  return false;
}

const isAdmin = () => currentUser?.role === 'admin';
const isAgent = () => currentUser?.role === 'agent' || currentUser?.role === 'admin';

// ================================================================
// EMAIL (EmailJS)
// ================================================================
function emailReady() {
  return !!(CONFIG.emailJS.publicKey && CONFIG.emailJS.serviceId && CONFIG.emailJS.templateId);
}

async function sendEmail(toEmail, toName, subject, message, ticket) {
  if (!emailReady()) return false;
  try {
    emailjs.init(CONFIG.emailJS.publicKey);
    await emailjs.send(CONFIG.emailJS.serviceId, CONFIG.emailJS.templateId, {
      to_email:      toEmail,
      to_name:       toName,
      subject:       subject,
      message:       message,
      ticket_number: ticket?.number  || '',
      ticket_title:  ticket?.title   || '',
      portal_url:    CONFIG.portalUrl || window.location.href,
    });
    return true;
  } catch(e) { console.error('EmailJS error:', e); return false; }
}

// ================================================================
// DATA HELPERS
// ================================================================
const getTickets    = () => Store.get('tickets', []);
const getUsers      = () => Store.get('users',[]).filter(u => !u.deleted);       // active records
const getAllUsers    = () => Store.get('users',[]);                                // incl. deleted (for history)
const getCategories = () => Store.get('categories', []);

// ================================================================
// ACTIVITY LOGGING
// ================================================================
function logActivity(type, action, ticket, details) {
  const logs = Store.get('activityLogs', []);
  logs.push({
    id:           Date.now().toString() + Math.random().toString(36).slice(2,5),
    type,
    action,
    ticketId:     ticket?.id     || null,
    ticketNumber: ticket?.number || null,
    ticketTitle:  ticket?.title  || null,
    by:           currentUser?.name || 'System',
    byRole:       currentUser?.role || '',
    at:           new Date().toISOString(),
    details:      details || '',
  });
  if (logs.length > 2000) logs.splice(0, logs.length - 2000);
  Store.set('activityLogs', logs);
}

function createTicket(data) {
  const seq = Store.get('ticketSeq',0) + 1;
  Store.set('ticketSeq', seq);
  const t = {
    id:             Date.now().toString(),
    number:         'TKT-' + String(seq).padStart(4,'0'),
    title:          data.title,
    description:    data.description,
    status:         'open',
    priority:       data.priority   || 'medium',
    category:       data.category   || '1',
    requesterId:    currentUser.id,
    requesterName:  currentUser.name,
    requesterEmail: currentUser.email,
    assigneeId:     data.assigneeId || null,
    history:        [{ action:'Ticket created', by:currentUser.name, at:new Date().toISOString() }],
    comments:       [],
    resolvedAt:     null,
    closedAt:       null,
    createdAt:      new Date().toISOString(),
    updatedAt:      new Date().toISOString(),
  };
  const all = getTickets(); all.push(t); Store.set('tickets', all);
  logActivity('ticket_created', 'Ticket created', t, `Priority: ${t.priority} | Category: ${(getCategories().find(c=>c.id===t.category)||{}).name||''}`);
  return t;
}

async function updateTicket(id, updates) {
  const all = getTickets();
  const i   = all.findIndex(t => t.id === id);
  if (i === -1) return null;
  const old = { ...all[i] };

  // Build history entry
  const changes = [];
  if (updates.status    && updates.status    !== old.status)   changes.push(`Status: ${STATUS_LABELS[old.status]||old.status} → ${STATUS_LABELS[updates.status]}`);
  if (updates.priority  && updates.priority  !== old.priority) changes.push(`Priority: ${old.priority} → ${updates.priority}`);
  if ('assigneeId' in updates && updates.assigneeId !== old.assigneeId) {
    const a = getAllUsers().find(u => u.id === updates.assigneeId);
    changes.push(`Assigned to: ${a ? a.name : 'Unassigned'}`);
  }
  if (changes.length) {
    all[i].history = all[i].history || [];
    all[i].history.push({ action: changes.join(' | '), by: currentUser.name, at: new Date().toISOString() });
    logActivity('ticket_updated', changes.join(' | '), all[i]);
  }

  if (updates.status === 'resolved' && !old.resolvedAt) updates.resolvedAt = new Date().toISOString();
  if (updates.status === 'closed'   && !old.closedAt)   updates.closedAt   = new Date().toISOString();

  all[i] = { ...all[i], ...updates, updatedAt: new Date().toISOString() };
  Store.set('tickets', all);

  // Send email notification when ticket is closed
  if (updates.status === 'closed' && old.status !== 'closed' && old.requesterEmail) {
    const sent = await sendEmail(
      old.requesterEmail,
      old.requesterName,
      `Your ticket ${old.number} has been closed`,
      `Hi ${old.requesterName},\n\nYour IT support ticket "${old.title}" (${old.number}) has been resolved and closed by our team.\n\nIf the issue persists or you need further assistance, please submit a new ticket.\n\nThank you for contacting IT Support.`,
      old
    );
    if (sent) showToast(`✉️ Closure email sent to ${old.requesterEmail}`);
    else if (emailReady()) showToast('⚠️ Email send failed — check EmailJS config', 'warning');
  }

  return all[i];
}

function addComment(ticketId, body, isInternal) {
  const all = getTickets();
  const t   = all.find(t => t.id === ticketId);
  if (!t) return;
  t.comments = t.comments || [];
  t.comments.push({ id: Date.now().toString(), authorId: currentUser.id, authorName: currentUser.name, body, isInternal, createdAt: new Date().toISOString() });
  t.history = t.history || [];
  t.history.push({ action: isInternal ? 'Internal note added' : 'Comment added', by: currentUser.name, at: new Date().toISOString() });
  t.updatedAt = new Date().toISOString();
  Store.set('tickets', all);
  logActivity(isInternal ? 'internal_note' : 'comment_added', isInternal ? 'Internal note added' : 'Comment added', t);
}

// ================================================================
// UTILITIES
// ================================================================
function fmt(iso) { if(!iso) return '—'; return new Date(iso).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric',hour:'2-digit',minute:'2-digit'}); }
function ago(iso) { const m=Math.floor((Date.now()-new Date(iso))/60000); if(m<1)return 'just now'; if(m<60)return m+'m ago'; if(m<1440)return Math.floor(m/60)+'h ago'; return Math.floor(m/1440)+'d ago'; }
function resTime(t) { if(!t.resolvedAt&&!t.closedAt)return '—'; const h=Math.round((new Date(t.resolvedAt||t.closedAt)-new Date(t.createdAt))/3600000); return h<24?h+'h':Math.floor(h/24)+'d '+(h%24)+'h'; }

const STATUS_LABELS  = { open:'Open', in_progress:'In Progress', pending:'Pending', resolved:'Resolved', closed:'Closed' };
const STATUS_COLORS  = { open:'bg-blue-100 text-blue-700', in_progress:'bg-yellow-100 text-yellow-700', pending:'bg-orange-100 text-orange-700', resolved:'bg-green-100 text-green-700', closed:'bg-slate-100 text-slate-500' };
const PRIORITY_COLORS= { low:'bg-slate-100 text-slate-600', medium:'bg-blue-100 text-blue-700', high:'bg-orange-100 text-orange-700', critical:'bg-red-100 text-red-700' };

const bdg  = (lbl,cls) => `<span class="px-2 py-0.5 rounded-full text-xs font-semibold ${cls}">${lbl}</span>`;
const avtr = (name,sz='w-7 h-7') => `<div class="${sz} rounded-full bg-indigo-100 flex items-center justify-center text-indigo-600 font-bold text-xs flex-shrink-0">${(name||'?').charAt(0).toUpperCase()}</div>`;

// SLA helpers
const SLA_HOURS = { critical:4, high:24, medium:48, low:120 };

function getSLAStatus(t) {
  if (!t || ['resolved','closed'].includes(t.status)) return null;
  const h = (Date.now() - new Date(t.createdAt)) / 3600000;
  const sla = SLA_HOURS[t.priority] || 48;
  if (h > sla) return 'overdue';
  if (h > sla * 0.75) return 'due_soon';
  return 'ok';
}

function slaAge(t) {
  const h   = Math.round((Date.now() - new Date(t.createdAt)) / 3600000);
  const sla = SLA_HOURS[t.priority] || 48;
  const over = h - sla;
  if (over > 0) return `+${over}h`;
  if (h < 1)   return '<1h';
  if (h < 24)  return `${h}h`;
  return `${Math.floor(h/24)}d`;
}

function statusPill(count, label, cls) {
  return `<button onclick="render('tickets',{status:'${label.toLowerCase().replace(' ','_')}'})"
    class="inline-flex items-center gap-1.5 px-2.5 py-1 rounded-full text-xs font-semibold ${cls} cursor-pointer hover:opacity-80 transition-opacity">
    <strong>${String(count).padStart(2,'0')}</strong>${label}
  </button>`;
}

function miniStat(label, val, color, status) {
  return `<div class="bg-white border border-slate-100 rounded-xl p-3 text-center shadow-sm hover:shadow-md transition-all cursor-pointer"
    ${status ? `onclick="render('tickets',{status:'${status}'})"` : ''}>
    <div class="text-2xl font-bold ${color}">${val}</div>
    <div class="text-xs text-slate-500 mt-0.5 leading-tight">${label}</div>
  </div>`;
}

function exportCSV(rows, filename) {
  const csv = rows.map(r => r.map(c => `"${String(c??'').replace(/"/g,'""')}"`).join(',')).join('\n');
  const a   = document.createElement('a');
  a.href    = URL.createObjectURL(new Blob([csv],{type:'text/csv'}));
  a.download = filename; a.click();
}

// ================================================================
// TOAST
// ================================================================
function showToast(msg, type='success') {
  const color = type==='error'?'bg-red-600':type==='warning'?'bg-amber-500':'bg-emerald-600';
  const t = document.createElement('div');
  t.className = `fixed bottom-5 right-5 ${color} text-white px-5 py-3 rounded-xl shadow-lg text-sm font-medium z-50`;
  t.textContent = msg; document.body.appendChild(t);
  setTimeout(() => t.remove(), 3500);
}

// ================================================================
// ROUTER
// ================================================================
let currentPage = 'dashboard', currentTicketId = null;

function render(page, params={}) {
  // Access control
  if (page === 'reports' && !isAdmin()) { showToast('Access denied — Admins only','error'); return; }
  if (page === 'users'   && !isAdmin()) { showToast('Access denied — Admins only','error'); return; }
  if (page === 'logs'    && !isAdmin()) { showToast('Access denied — Admins only','error'); return; }

  currentPage = page;
  if (params.ticketId) currentTicketId = params.ticketId;
  const root = document.getElementById('root');
  if (page === 'login') { root.innerHTML = renderLogin(); bindLogin(); return; }
  root.innerHTML = renderShell(getPageContent(page, params));
  bindNav(); bindPageEvents(page, params);
}

function getPageContent(page, params) {
  switch(page) {
    case 'dashboard':  return renderDashboard();
    case 'tickets':    return renderTicketList(params);
    case 'new-ticket': return renderNewTicket();
    case 'ticket':     return renderTicketDetail(params.ticketId);
    case 'reports':    return renderReports(params);
    case 'users':      return renderUsers();
    case 'logs':       return renderLogs();
    default:           return renderDashboard();
  }
}

// ================================================================
// LAYOUT / SHELL
// ================================================================
function renderShell(content) {
  const links = [
    { page:'dashboard',  label:'Dashboard', icon:'📊' },
    { page:'tickets',    label:'Tickets',   icon:'🎫' },
    { page:'new-ticket', label:'New Ticket',icon:'➕' },
    ...(isAdmin() ? [
      { page:'reports', label:'Reports', icon:'📈' },
      { page:'users',   label:'Users',   icon:'👥' },
      { page:'logs',    label:'Logs',    icon:'📋' },
    ] : []),
  ];

  return `
  <div class="flex h-screen overflow-hidden">

    <!-- Mobile top bar -->
    <div class="md:hidden fixed top-0 left-0 right-0 z-40 bg-slate-900 flex items-center px-4 border-b border-slate-700" style="height:52px">
      <button id="btn-menu" class="text-slate-300 hover:text-white text-2xl leading-none mr-3">☰</button>
      <div class="flex items-center gap-2">
        <div class="w-7 h-7 bg-indigo-600 rounded-lg flex items-center justify-center text-white font-bold text-xs">IT</div>
        <span class="text-white font-semibold text-sm">IT Ticketing</span>
      </div>
    </div>

    <!-- Sidebar overlay (mobile) -->
    <div id="sidebar-overlay" class="hidden fixed inset-0 bg-black/50 z-30 md:hidden" onclick="closeSidebar()"></div>

    <!-- Sidebar -->
    <aside id="sidebar"
      class="fixed md:relative inset-y-0 left-0 w-64 md:w-56 bg-slate-900 flex flex-col flex-shrink-0 z-40
        -translate-x-full md:translate-x-0 transition-transform duration-200 ease-in-out">
      <div class="p-4 border-b border-slate-700">
        <div class="flex items-center gap-2">
          <div class="w-8 h-8 bg-indigo-600 rounded-lg flex items-center justify-center text-white font-bold text-sm">IT</div>
          <div>
            <div class="text-white font-semibold text-sm leading-tight">IT Ticketing</div>
            <div class="text-slate-400 text-xs">System</div>
          </div>
        </div>
      </div>
      <nav class="flex-1 p-3 space-y-1 overflow-y-auto">
        ${links.map(l => `
          <a href="#" data-page="${l.page}" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium transition-all
            ${currentPage === l.page ? 'bg-indigo-600 text-white' : 'text-slate-300 hover:bg-slate-700 hover:text-white'}">
            <span>${l.icon}</span><span>${l.label}</span>
          </a>`).join('')}
      </nav>
      <div class="p-3 border-t border-slate-700">
        <div class="flex items-center gap-2 px-2 py-2">
          ${avtr(currentUser.name)}
          <div class="flex-1 min-w-0">
            <div class="text-white text-xs font-medium truncate">${currentUser.name}</div>
            <div class="text-slate-400 text-xs capitalize">${currentUser.role}</div>
          </div>
          ${(()=>{
            const n24 = Store.get('activityLogs',[]).filter(l=>(Date.now()-new Date(l.at))<86400000).length;
            return `<button id="btn-notif" title="Notifications" class="text-slate-400 hover:text-white text-sm mr-1 relative">
              🔔
              ${n24>0?`<span class="absolute -top-0.5 -right-0.5 w-3.5 h-3.5 bg-red-500 rounded-full text-white flex items-center justify-center font-bold" style="font-size:8px">${n24>9?'9+':n24}</span>`:''}
            </button>`;
          })()}
          <button id="btn-dm" title="Toggle dark mode" class="text-slate-400 hover:text-yellow-300 text-sm mr-1">🌙</button>
          <button id="btn-logout" title="Sign Out" class="text-slate-400 hover:text-white text-base">⏏</button>
        </div>
      </div>
    </aside>

    <main class="flex-1 overflow-auto bg-slate-50 pt-[52px] md:pt-0">${content}</main>
  </div>`;
}

function closeSidebar() {
  document.getElementById('sidebar')?.classList.add('-translate-x-full');
  document.getElementById('sidebar-overlay')?.classList.add('hidden');
}

// ================================================================
// LOGIN PAGE
// ================================================================
function renderLogin() {
  const dark = document.documentElement.classList.contains('dark');
  return `
  <div id="login-bg" class="min-h-screen flex items-center justify-center p-4 relative overflow-hidden
    ${dark ? 'bg-slate-900' : 'bg-gradient-to-br from-slate-900 via-indigo-950 to-slate-900'}">
    <div class="absolute inset-0 opacity-10" style="background-image:radial-gradient(circle,#6366f1 1px,transparent 1px);background-size:32px 32px"></div>

    <!-- Dark mode toggle -->
    <button id="dm-toggle" title="Toggle dark mode"
      class="fixed top-4 right-4 z-50 w-9 h-9 rounded-full flex items-center justify-center text-lg shadow-lg border transition-all
        ${dark ? 'bg-slate-700 border-slate-600 text-yellow-300 hover:bg-slate-600' : 'bg-white/20 border-white/30 text-white hover:bg-white/30'}">
      ${dark ? '☀️' : '🌙'}
    </button>

    <div class="relative w-full max-w-md">
      <div class="rounded-2xl shadow-2xl p-7 ${dark ? 'bg-slate-800 border border-slate-700' : 'bg-white'}">
        <div class="text-center mb-6">
          <div class="w-14 h-14 bg-indigo-600 rounded-2xl flex items-center justify-center mx-auto mb-3 shadow-lg text-2xl">🎫</div>
          <h1 class="text-2xl font-bold ${dark ? 'text-white' : 'text-slate-900'}">IT Ticketing System</h1>
          <p class="text-sm mt-1 ${dark ? 'text-slate-400' : 'text-slate-500'}">Sign in with your company email</p>
        </div>

        <form id="login-form" class="space-y-4">
          <div>
            <label class="block text-xs font-medium mb-1 ${dark ? 'text-slate-300' : 'text-slate-600'}">Email Address</label>
            <input id="login-email" type="email" required autofocus placeholder="you@company.com"
              class="w-full border rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500
                ${dark ? 'bg-slate-900 border-slate-600 text-white placeholder-slate-500' : 'border-slate-300 text-slate-900'}"/>
          </div>
          <div>
            <label class="block text-xs font-medium mb-1 ${dark ? 'text-slate-300' : 'text-slate-600'}">Password</label>

              class="w-full border rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500
                ${dark ? 'bg-slate-900 border-slate-600 text-white placeholder-slate-500' : 'border-slate-300 text-slate-900'}"/>

          <div id="login-error" class="hidden text-red-500 text-xs bg-red-50 px-3 py-2 rounded-lg border border-red-100 text-center"></div>
          <button type="submit"
            class="w-full bg-indigo-600 text-white rounded-lg py-2.5 font-semibold text-sm hover:bg-indigo-700 active:scale-95 transition-all">
            Sign In

        </form>

        <p class="text-center text-xs mt-5 ${dark ? 'text-slate-600' : 'text-slate-400'}">IT Ticketing System · Company Internal<br>
          <span class="${dark ? 'text-slate-700' : 'text-slate-300'}">Access is restricted to authorized users only.</span>
        </p>
      </div>
    </div>
  </div>`;
}

function bindLogin() {
  document.getElementById('dm-toggle')?.addEventListener('click', () => {
    document.documentElement.classList.toggle('dark');
    Store.set('darkMode', document.documentElement.classList.contains('dark'));
    render('login');
  });

  document.getElementById('login-form').addEventListener('submit', e => {
    e.preventDefault();
    const ok = login(
      document.getElementById('login-email').value.trim().toLowerCase(),
      document.getElementById('login-password').value
    );
    if (ok) {
      render('dashboard');
    } else {
      const err = document.getElementById('login-error');
      err.textContent = 'Invalid email or password. Please try again.';
      err.classList.remove('hidden');
    }
  });
}

function renderDashboard() {
  const all      = getTickets();
  const mine     = isAgent() ? all : all.filter(t => t.requesterId === currentUser.id);
  const cats     = getCategories();
  const allUsers = getAllUsers();
  const active   = mine.filter(t => !['resolved','closed'].includes(t.status));

  const cOpen   = mine.filter(t => t.status === 'open').length;
  const cInProg = mine.filter(t => t.status === 'in_progress').length;
  const cPend   = mine.filter(t => t.status === 'pending').length;
  const cRes    = mine.filter(t => t.status === 'resolved').length;
  const cClosed = mine.filter(t => t.status === 'closed').length;

  const overdue  = active.filter(t => getSLAStatus(t) === 'overdue');
  const dueSoon  = active.filter(t => getSLAStatus(t) === 'due_soon');
  const critical = active.filter(t => t.priority === 'critical').length;
  const high     = active.filter(t => t.priority === 'high').length;

  // Urgent tickets (critical + overdue), deduped, sorted by priority
  const urgentMap = {};
  [...overdue, ...active.filter(t => t.priority === 'critical')].forEach(t => { urgentMap[t.id] = t; });
  const urgentList = Object.values(urgentMap)
    .sort((a,b) => { const p={critical:4,high:3,medium:2,low:1}; return (p[b.priority]||0)-(p[a.priority]||0); })
    .slice(0, 8);

  // Category breakdown (open tickets only)
  // Category breakdown
  const catBreakdown = cats.map(c => ({
    ...c, count: mine.filter(t => t.category===c.id && !['resolved','closed'].includes(t.status)).length,
  })).filter(c=>c.count>0).sort((a,b)=>b.count-a.count);

  // Agent workload
  const agentLoad = getUsers().filter(u=>u.role==='agent'||u.role==='admin').map(a=>({
    ...a, open: all.filter(t=>t.assigneeId===a.id && ['open','in_progress','pending'].includes(t.status)).length,

  const maxLoad = Math.max(...agentLoad.map(a=>a.open), 1);

  // 7-day trend
  const days      = Array.from({length:7},(_,i)=>{ const d=new Date(); d.setDate(d.getDate()-(6-i)); return d; });
  const dayLabels = days.map(d=>d.toLocaleDateString('en-US',{month:'short',day:'numeric'}));
  const dayData   = days.map(d=>mine.filter(t=>new Date(t.createdAt).toDateString()===d.toDateString()).length);

  // Recent activity logs
  const recentLogs = Store.get('activityLogs',[]).slice(-12).reverse();

  const byStatus = Object.keys(STATUS_LABELS).map(s=>mine.filter(t=>t.status===s).length);

      </div>
      <a href="#" data-page="new-ticket"
        class="bg-indigo-600 text-white px-4 py-2 rounded-lg text-sm font-semibold hover:bg-indigo-700 active:scale-95 transition-all flex-shrink-0 shadow-sm">

    <!-- ═══ ATERA-STYLE STATUS BAR ═══ -->

      <div class="flex items-center gap-x-5 gap-y-2 flex-wrap min-w-max sm:min-w-0">
        <div class="flex items-center gap-2 flex-wrap">

          ${statusPill(cOpen,   'Open',        'bg-blue-100 text-blue-700')}
          ${statusPill(cInProg, 'In Progress', 'bg-yellow-100 text-yellow-700')}
          ${statusPill(cPend,   'Pending',     'bg-orange-100 text-orange-700')}

function renderTicketList(params={}) {
  const all  = getTickets();
  const cats = getCategories();
  const fs=params.status||'', fp=params.priority||'', fq=params.search||'';

  let list = isAgent() ? all : all.filter(t => t.requesterId === currentUser.id);
  if (fs) list = list.filter(t => t.status   === fs);
  if (fp) list = list.filter(t => t.priority === fp);
  if (fq) list = list.filter(t => t.title.toLowerCase().includes(fq.toLowerCase()) || t.number.toLowerCase().includes(fq.toLowerCase()));
  list = [...list].sort((a,b) => new Date(b.createdAt) - new Date(a.createdAt));

  return `
  <div class="p-4 md:p-6">
    <div class="flex items-center justify-between mb-4 gap-3">

          <option value="">All Priorities</option>
          ${['low','medium','high','critical'].map(p=>`<option value="${p}" ${fp===p?'selected':''}>${p.charAt(0).toUpperCase()+p.slice(1)}</option>`).join('')}

    </div>

      ${list.length === 0
        ? `<div class="p-12 text-center text-slate-400 text-sm">No tickets found.</div>`

                <tr>
                  <th class="text-left px-4 py-3 text-xs font-semibold text-slate-500 uppercase">Ticket</th>
                  <th class="text-left px-4 py-3 text-xs font-semibold text-slate-500 uppercase">Status</th>
                  <th class="text-left px-4 py-3 text-xs font-semibold text-slate-500 uppercase hidden sm:table-cell">Priority</th>
                  <th class="text-left px-4 py-3 text-xs font-semibold text-slate-500 uppercase hidden md:table-cell">Category</th>

                  <th class="text-left px-4 py-3 text-xs font-semibold text-slate-500 uppercase hidden lg:table-cell">Created</th>
                </tr>
              </thead>
              <tbody class="divide-y divide-slate-50">
                ${list.map(t => {
                  const cat = cats.find(c => c.id === t.category);
                  return `
                  <tr class="hover:bg-slate-50 cursor-pointer transition-colors" onclick="render('ticket',{ticketId:'${t.id}'})">
                    <td class="px-4 py-3"><div class="font-medium text-slate-800 text-sm">${t.title}</div><div class="text-xs text-slate-400 font-mono">${t.number}</div></td>

                    <td class="px-4 py-3 hidden sm:table-cell">${bdg(t.priority.charAt(0).toUpperCase()+t.priority.slice(1), PRIORITY_COLORS[t.priority]||'')}</td>
                    <td class="px-4 py-3 text-slate-600 hidden md:table-cell">${cat ? cat.icon+' '+cat.name : '—'}</td>
                    ${isAgent() ? `<td class="px-4 py-3 text-slate-600 hidden lg:table-cell">${t.requesterName}</td>` : ''}

        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1">Description <span class="text-red-500">*</span></label>
          <textarea id="nt-desc" required rows="5" placeholder="Describe the problem in detail…"
            class="w-full border border-slate-300 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 resize-none"></textarea>
        </div>
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">

          <select id="nt-assignee" class="w-full border border-slate-300 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500">
            <option value="">Unassigned</option>
            ${agents.map(a => `<option value="${a.id}">${a.name}</option>`).join('')}
          </select>
        </div>` : ''}
        <div class="flex gap-3 pt-2">
          <button type="submit" class="bg-indigo-600 text-white px-6 py-2.5 rounded-lg text-sm font-semibold hover:bg-indigo-700 transition-colors">Submit Ticket</button>
          <button type="button" onclick="render('tickets')" class="border border-slate-200 text-slate-600 px-6 py-2.5 rounded-lg text-sm font-medium hover:bg-slate-50">Cancel</button>
        </div>

    </div>
    <div class="bg-blue-50 border border-blue-200 rounded-xl p-4">
      <div class="flex items-start gap-3">
        <span class="text-xl">📧</span>
        <div>
          <div class="font-semibold text-blue-800 text-sm">Submit via Email</div>
          <div class="text-blue-700 text-xs mt-1">
            You can also email <strong>${CONFIG.supportEmail}</strong> to create a ticket.
            To automate email-to-ticket creation, configure email forwarding via
            <a href="https://zapier.com" target="_blank" class="underline">Zapier</a> or
            <a href="https://make.com" target="_blank" class="underline">Make.com</a>.
          </div>
        </div>
      </div>
    </div>
  </div>`;
}

function renderTicketDetail(ticketId) {
  const ticket   = getTickets().find(t => t.id === ticketId);
  if (!ticket) return '<div class="p-6 text-center text-slate-400">Ticket not found.</div>';
  const cats     = getCategories();
  const allUsers = getAllUsers();
  const cat      = cats.find(c => c.id === ticket.category);
  const assignee = allUsers.find(u => u.id === ticket.assigneeId);
  const agents   = getUsers().filter(u => u.role === 'agent' || u.role === 'admin');

  return `
  <div class="p-4 md:p-6">
    <button onclick="render('tickets')" class="text-slate-500 hover:text-slate-700 text-sm mb-4">← Back to Tickets</button>
    <div class="grid grid-cols-1 lg:grid-cols-3 gap-4 md:gap-6 max-w-5xl">

      <div class="lg:col-span-2 space-y-4">
        <!-- Ticket Body -->
        <div class="bg-white rounded-xl shadow-sm border border-slate-100 p-6">
          <div class="flex items-start justify-between gap-4 mb-4">
            <div>
              <div class="font-mono text-xs text-slate-400 mb-1">${ticket.number}</div>
              <h1 class="text-xl font-bold text-slate-900">${ticket.title}</h1>
              <div class="text-xs text-slate-400 mt-1">by ${ticket.requesterName} · ${ago(ticket.createdAt)}</div>
            </div>
            <div class="flex flex-col items-end gap-1.5 flex-shrink-0">
              ${bdg(STATUS_LABELS[ticket.status]||ticket.status, STATUS_COLORS[ticket.status]||'')}
              ${bdg(ticket.priority.charAt(0).toUpperCase()+ticket.priority.slice(1), PRIORITY_COLORS[ticket.priority]||'')}
            </div>
          </div>
          <div class="text-sm text-slate-600 whitespace-pre-wrap border-t border-slate-100 pt-4">${ticket.description}</div>
        </div>

        <!-- Comments -->
        <div class="bg-white rounded-xl shadow-sm border border-slate-100">
          <div class="px-5 py-4 border-b border-slate-100">
            <h2 class="font-semibold text-slate-900">Comments <span class="text-slate-400 font-normal text-sm">(${(ticket.comments||[]).length})</span></h2>
          </div>
          ${(ticket.comments||[]).length === 0
            ? '<div class="px-5 py-8 text-center text-slate-400 text-sm">No comments yet.</div>'
            : `<div class="divide-y divide-slate-50">
                ${(ticket.comments||[]).map(c => `
                  <div class="px-5 py-4 ${c.isInternal ? 'bg-amber-50' : ''}">
                    <div class="flex items-center gap-2 mb-2">
                      ${avtr(c.authorName)}
                      <span class="font-medium text-sm text-slate-800">${c.authorName}</span>
                      <span class="text-xs text-slate-400">${ago(c.createdAt)}</span>
                      ${c.isInternal ? bdg('Internal Note','bg-amber-100 text-amber-700') : ''}
                    </div>
                    <div class="text-sm text-slate-700 whitespace-pre-wrap pl-9">${c.body}</div>
                  </div>`).join('')}
              </div>`}
          <div class="px-5 py-4 border-t border-slate-100 bg-slate-50 rounded-b-xl">
            <textarea id="comment-body" rows="2" placeholder="Comment…"
              class="w-full border border-slate-200 bg-white rounded-lg px-3 py-1.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 resize-none mb-2"></textarea>
            <div class="flex gap-2">
              <button id="btn-comment" data-id="${ticket.id}"
                class="bg-indigo-600 text-white px-4 py-2 rounded-lg text-sm font-semibold hover:bg-indigo-700">Add Comment</button>
              ${isAgent() ? `
              <button id="btn-internal" data-id="${ticket.id}"
                class="border border-amber-300 text-amber-700 px-4 py-2 rounded-lg text-sm font-medium hover:bg-amber-50">Internal Note</button>` : ''}
            </div>
          </div>
        </div>

        <!-- History -->
        <div class="bg-white rounded-xl shadow-sm border border-slate-100">
          <div class="px-5 py-4 border-b border-slate-100">
            <h2 class="font-semibold text-slate-900">Activity History</h2>
          </div>
          <div class="px-5 py-3 space-y-2 max-h-48 overflow-y-auto">
            ${(ticket.history||[]).slice().reverse().map(h => `
              <div class="flex items-start gap-2 text-xs">
                <span class="text-indigo-300 mt-0.5 flex-shrink-0">●</span>
                <div class="text-slate-500"><span class="font-semibold text-slate-700">${h.by}</span> — ${h.action} <span class="text-slate-400">${ago(h.at)}</span></div>
              </div>`).join('')}
          </div>
        </div>
      </div>

      <!-- Right Panel -->
      <div class="space-y-4">
        <div class="bg-white rounded-xl shadow-sm border border-slate-100 p-5">
          <h3 class="font-semibold text-slate-900 mb-4">Details</h3>
          <div class="space-y-3 text-sm">
            <div class="flex justify-between"><span class="text-slate-500">Requester</span><span class="font-medium text-slate-800">${ticket.requesterName}</span></div>
            <div class="flex justify-between"><span class="text-slate-500">Assigned To</span><span class="font-medium text-slate-800">${assignee ? assignee.name : '—'}</span></div>
            <div class="flex justify-between"><span class="text-slate-500">Category</span><span>${cat ? cat.icon+' '+cat.name : '—'}</span></div>
            <div class="flex justify-between"><span class="text-slate-500">Created</span><span class="text-xs text-slate-500">${fmt(ticket.createdAt)}</span></div>
            <div class="flex justify-between"><span class="text-slate-500">Updated</span><span class="text-xs text-slate-500">${ago(ticket.updatedAt)}</span></div>
            ${ticket.resolvedAt ? `<div class="flex justify-between"><span class="text-slate-500">Resolved</span><span class="text-xs text-slate-500">${fmt(ticket.resolvedAt)}</span></div>` : ''}
            ${ticket.closedAt   ? `<div class="flex justify-between"><span class="text-slate-500">Closed</span><span class="text-xs text-slate-500">${fmt(ticket.closedAt)}</span></div>` : ''}
            <div class="flex justify-between pt-2 border-t border-slate-100"><span class="text-slate-500">Resolution Time</span><span class="font-semibold">${resTime(ticket)}</span></div>
          </div>
        </div>

        ${isAgent() ? `
        <div class="bg-white rounded-xl shadow-sm border border-slate-100 p-5">
          <h3 class="font-semibold text-slate-900 mb-4">Update Ticket</h3>
          <div class="space-y-3">
            <div>
              <label class="block text-xs font-medium text-slate-500 mb-1">Status</label>
              <select id="edit-status" class="w-full border border-slate-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500">
                ${Object.entries(STATUS_LABELS).map(([v,l]) => `<option value="${v}" ${ticket.status===v?'selected':''}>${l}</option>`).join('')}
              </select>
            </div>
            <div>
              <label class="block text-xs font-medium text-slate-500 mb-1">Priority</label>
              <select id="edit-priority" class="w-full border border-slate-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500">

              </select>
            </div>
            <div>
              <label class="block text-xs font-medium text-slate-500 mb-1">Assign To</label>
              <select id="edit-assignee" class="w-full border border-slate-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500">
                <option value="">Unassigned</option>
                ${agents.map(a => `<option value="${a.id}" ${ticket.assigneeId===a.id?'selected':''}>${a.name}</option>`).join('')}
              </select>
            </div>
            <button id="btn-update" data-id="${ticket.id}"
              class="w-full bg-indigo-600 text-white py-2.5 rounded-lg text-sm font-semibold hover:bg-indigo-700 transition-colors">
              Save Changes
            </button>
            ${emailReady() ? '' : `<p class="text-xs text-slate-400 text-center">⚠️ EmailJS not configured — closure emails disabled</p>`}
          </div>
        </div>` : ''}
      </div>
    </div>
  </div>`;
}

// ================================================================

// ================================================================
function renderReports(params={}) {
  if (!isAdmin()) return '<div class="p-6 text-center text-slate-400">Access denied.</div>';

  const now      = new Date();
  const selMonth = parseInt(params.month || now.getMonth()+1);
  const selYear  = parseInt(params.year  || now.getFullYear());
  const MONTHS   = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  const years    = Array.from({length:4},(_,i)=>now.getFullYear()-i);

  const allTickets = getTickets();
  const allUsers   = getAllUsers();
  const cats       = getCategories();

  const monthly = allTickets.filter(t => {
    const d = new Date(t.createdAt);
    return d.getFullYear() === selYear && d.getMonth()+1 === selMonth;
  }).sort((a,b) => new Date(b.createdAt)-new Date(a.createdAt));

  const byStatus  = Object.keys(STATUS_LABELS).map(s => monthly.filter(t=>t.status===s).length);
  const byPrio    = ['low','medium','high','critical'].map(p=>monthly.filter(t=>t.priority===p).length);

  return `
  <div class="p-4 md:p-6">
    <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-3 mb-6">
      <div>
        <h1 class="text-xl md:text-2xl font-bold text-slate-900">Monthly Reports</h1>
        <p class="text-slate-500 text-sm">${allTickets.length} total tickets in system</p>
      </div>
      <div class="flex flex-wrap items-center gap-2">
        <select id="rep-month" class="border border-slate-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500">
          ${MONTHS.map((m,i) => `<option value="${i+1}" ${selMonth===i+1?'selected':''}>${m}</option>`).join('')}
        </select>
        <select id="rep-year" class="border border-slate-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500">
          ${years.map(y => `<option value="${y}" ${selYear===y?'selected':''}>${y}</option>`).join('')}
        </select>
        <button id="btn-rep-filter" class="bg-indigo-600 text-white px-4 py-2 rounded-lg text-sm font-semibold hover:bg-indigo-700">View</button>
        <button id="btn-export-csv" class="bg-emerald-600 text-white px-4 py-2 rounded-lg text-sm font-semibold hover:bg-emerald-700">⬇ Export</button>
      </div>
    </div>

    <!-- Monthly Stats -->
    <div class="grid grid-cols-2 sm:grid-cols-5 gap-3 mb-6">
      ${Object.entries(STATUS_LABELS).map(([v,l]) => {
        const cnt = monthly.filter(t=>t.status===v).length;
        return `<div class="bg-white border border-slate-100 rounded-xl p-4 text-center shadow-sm">
          <div class="text-2xl font-bold text-slate-900">${cnt}</div>
          <div class="text-xs text-slate-500 mt-1">${l}</div>
        </div>`;
      }).join('')}
    </div>

    <!-- Charts -->
    <div class="grid grid-cols-1 lg:grid-cols-2 gap-5 mb-6">
      <div class="bg-white rounded-xl shadow-sm border border-slate-100 p-5">
        <h3 class="font-semibold text-slate-800 mb-3 text-sm">Status — ${MONTHS[selMonth-1]} ${selYear}</h3>
        <canvas id="rep-status" height="200"></canvas>
      </div>
      <div class="bg-white rounded-xl shadow-sm border border-slate-100 p-5">
        <h3 class="font-semibold text-slate-800 mb-3 text-sm">Priority — ${MONTHS[selMonth-1]} ${selYear}</h3>
        <canvas id="rep-priority" height="200"></canvas>
      </div>
    </div>

    <!-- Full Ticket Table -->
    <div class="bg-white rounded-xl shadow-sm border border-slate-100 overflow-hidden">
      <div class="px-5 py-4 border-b border-slate-100">
        <h3 class="font-semibold text-slate-900">${MONTHS[selMonth-1]} ${selYear} — ${monthly.length} ticket${monthly.length!==1?'s':''}</h3>
      </div>
      ${monthly.length === 0
        ? '<div class="p-10 text-center text-slate-400 text-sm">No tickets for this period.</div>'
        : `<div class="overflow-x-auto">
            <table class="w-full text-xs">
              <thead class="bg-slate-50 border-b border-slate-100">
                <tr>
                  <th class="text-left px-4 py-3 font-semibold text-slate-500 uppercase">Number</th>
                  <th class="text-left px-4 py-3 font-semibold text-slate-500 uppercase">Title</th>
                  <th class="text-left px-4 py-3 font-semibold text-slate-500 uppercase">Status</th>
                  <th class="text-left px-4 py-3 font-semibold text-slate-500 uppercase">Priority</th>
                  <th class="text-left px-4 py-3 font-semibold text-slate-500 uppercase">Category</th>
                  <th class="text-left px-4 py-3 font-semibold text-slate-500 uppercase">Requester</th>
                  <th class="text-left px-4 py-3 font-semibold text-slate-500 uppercase">Assigned To</th>
                  <th class="text-left px-4 py-3 font-semibold text-slate-500 uppercase">Created</th>
                  <th class="text-left px-4 py-3 font-semibold text-slate-500 uppercase">Last Updated</th>
                  <th class="text-left px-4 py-3 font-semibold text-slate-500 uppercase">Resolve Time</th>
                  <th class="text-left px-4 py-3 font-semibold text-slate-500 uppercase">Comments</th>
                  <th class="text-left px-4 py-3 font-semibold text-slate-500 uppercase">Last Action</th>
                </tr>
              </thead>
              <tbody class="divide-y divide-slate-50">
                ${monthly.map(t => {
                  const cat      = cats.find(c => c.id === t.category);
                  const assignee = allUsers.find(u => u.id === t.assigneeId);
                  const lastH    = (t.history||[]).slice(-1)[0];
                  return `
                  <tr class="hover:bg-slate-50 cursor-pointer" onclick="render('ticket',{ticketId:'${t.id}'})">
                    <td class="px-4 py-3 font-mono text-slate-500">${t.number}</td>
                    <td class="px-4 py-3 font-medium text-slate-800 max-w-xs"><div class="truncate max-w-xs">${t.title}</div></td>
                    <td class="px-4 py-3">${bdg(STATUS_LABELS[t.status]||t.status, STATUS_COLORS[t.status]||'')}</td>
                    <td class="px-4 py-3">${bdg(t.priority.charAt(0).toUpperCase()+t.priority.slice(1), PRIORITY_COLORS[t.priority]||'')}</td>
                    <td class="px-4 py-3 text-slate-600">${cat ? cat.name : '—'}</td>
                    <td class="px-4 py-3 text-slate-600">${t.requesterName}</td>
                    <td class="px-4 py-3 text-slate-600">${assignee ? assignee.name : '—'}</td>
                    <td class="px-4 py-3 text-slate-500">${fmt(t.createdAt)}</td>
                    <td class="px-4 py-3 text-slate-500">${fmt(t.updatedAt)}</td>
                    <td class="px-4 py-3 text-slate-500">${resTime(t)}</td>
                    <td class="px-4 py-3 text-center text-slate-600">${(t.comments||[]).length}</td>
                    <td class="px-4 py-3 text-slate-500 max-w-xs"><div class="truncate max-w-xs">${lastH ? lastH.action : '—'}</div></td>
                  </tr>`;
                }).join('')}
              </tbody>
            </table>
          </div>`}
    </div>
  </div>

  <script>
    (function(){
      const bs=${JSON.stringify(byStatus)}, bp=${JSON.stringify(byPrio)};
      const opts={responsive:true,plugins:{legend:{position:'bottom',labels:{boxWidth:10,font:{size:10}}}}};
      const s=document.getElementById('rep-status'), p=document.getElementById('rep-priority');
      if(s) new Chart(s,{type:'doughnut',data:{labels:${JSON.stringify(Object.values(STATUS_LABELS))},datasets:[{data:bs,backgroundColor:['#3b82f6','#eab308','#f97316','#22c55e','#94a3b8'],borderWidth:0}]},options:opts});
      if(p) new Chart(p,{type:'bar',data:{labels:['Low','Medium','High','Critical'],datasets:[{data:bp,backgroundColor:['#94a3b8','#3b82f6','#f97316','#ef4444'],borderRadius:4,borderSkipped:false}]},options:{...opts,plugins:{legend:{display:false}},scales:{y:{beginAtZero:true,ticks:{stepSize:1}}}}});
    })();
  <\/script>`;
}

        <tbody class="divide-y divide-slate-50">
          ${users.map(u => `
          <tr class="${u.deleted ? 'opacity-40' : ''}">
            <td class="px-5 py-3">
              <div class="flex items-center gap-2">
                ${avtr(u.name)}
                <div>
                  <div class="font-medium text-slate-800">${u.name}</div>
                  <div class="text-xs text-slate-400">${u.email}</div>
                </div>
              </div>
            </td>
            <td class="px-5 py-3 text-slate-600">${u.dept||'—'}</td>
            <td class="px-5 py-3">
              ${u.deleted
                ? `<span class="text-xs text-slate-400">${u.role}</span>`
                : `<select onchange="changeUserRole('${u.id}',this.value)"
                    class="border border-slate-200 rounded px-2 py-1 text-xs focus:outline-none focus:ring-1 focus:ring-indigo-400">
                    <option value="user"  ${u.role==='user'?'selected':''}>User</option>
                    <option value="agent" ${u.role==='agent'?'selected':''}>Agent</option>
                    <option value="admin" ${u.role==='admin'?'selected':''}>Admin</option>
                  </select>`}
            </td>
            <td class="px-5 py-3">
              ${u.deleted
                ? bdg('Deleted','bg-red-100 text-red-400')
                : u.active
                  ? bdg('Active','bg-green-100 text-green-700')
                  : bdg('Inactive','bg-slate-100 text-slate-500')}
            </td>
            <td class="px-5 py-3">
              ${u.deleted
                ? `<span class="text-xs text-slate-400 italic">History retained</span>`
                : `<div class="flex gap-2">
                    <button onclick="toggleUserActive('${u.id}')"
                      class="text-xs border border-slate-200 px-2.5 py-1 rounded-lg hover:bg-slate-50 text-slate-600 transition-colors">
                      ${u.active ? 'Deactivate' : 'Activate'}
                    </button>
                    ${u.id !== currentUser.id ? `
                    <button onclick="confirmDeleteUser('${u.id}','${u.name}')"
                      class="text-xs border border-red-200 px-2.5 py-1 rounded-lg hover:bg-red-50 text-red-500 transition-colors">
                      Delete
                    </button>` : '<span class="text-xs text-slate-400">(you)</span>'}
                  </div>`}
            </td>
          </tr>`).join('')}
        </tbody>
      </table>
      </div>
    </div>
    <p class="text-xs text-slate-400 mt-3 px-1">
      * Deleted users cannot log in but their ticket history is fully preserved in the system.
    </p>
  </div>`;
}

// User management — called from inline onclick
function changeUserRole(userId, role) {
  const users = Store.get('users',[]);
  const u = users.find(u => u.id === userId);
  if (u) { u.role = role; Store.set('users', users); showToast('Role updated'); }
}

function toggleUserActive(userId) {
  const users = Store.get('users',[]);
  const u = users.find(u => u.id === userId);
  if (u) { u.active = !u.active; Store.set('users', users); render('users'); showToast(u.active ? 'User activated' : 'User deactivated'); }
}

function confirmDeleteUser(userId, name) {
  if (!confirm(`Delete "${name}"?\n\nThey will no longer be able to log in, but all their tickets and history will remain in the system.`)) return;
  const users = Store.get('users',[]);
  const u = users.find(u => u.id === userId);
  if (u) {
    u.deleted = true;
    u.active  = false;
    Store.set('users', users);
    render('users');
    showToast(`${name} deleted — history retained`, 'warning');
  }
}

function bindNav() {
  document.querySelectorAll('[data-page]').forEach(el => {
    el.addEventListener('click', e => {
      e.preventDefault();
      closeSidebar();
      render(el.dataset.page, el.dataset.priority ? { priority: el.dataset.priority } : {});
    });
  });
  document.getElementById('btn-logout')?.addEventListener('click', logout);
  document.getElementById('btn-menu')?.addEventListener('click', () => {
    document.getElementById('sidebar')?.classList.toggle('-translate-x-full');
    document.getElementById('sidebar-overlay')?.classList.toggle('hidden');
  });
  document.getElementById('btn-dm')?.addEventListener('click', () => {
    document.documentElement.classList.toggle('dark');
    Store.set('darkMode', document.documentElement.classList.contains('dark'));
    const btn = document.getElementById('btn-dm');
    if (btn) btn.textContent = document.documentElement.classList.contains('dark') ? '☀️' : '🌙';
  });
  document.getElementById('btn-notif')?.addEventListener('click', e => {
    e.stopPropagation();
    let panel = document.getElementById('notif-panel');
    if (panel) { panel.remove(); return; }
    // Build notification panel
    const logs = Store.get('activityLogs',[]).slice(-20).reverse();
    panel = document.createElement('div');
    panel.id = 'notif-panel';
    panel.className = 'fixed z-50 w-72 bg-white rounded-xl shadow-2xl border border-slate-100 overflow-hidden flex flex-col';
    // Position: above/beside the sidebar footer
    const btn = document.getElementById('btn-notif');
    const rect = btn.getBoundingClientRect();
    panel.style.cssText = `bottom:${window.innerHeight-rect.top+8}px; left:${Math.min(rect.left, window.innerWidth-288)}px; max-height:360px;`;
    panel.innerHTML = `
      <div class="px-4 py-3 bg-slate-900 flex items-center justify-between flex-shrink-0">
        <span class="text-white font-semibold text-sm">Notifications</span>
        <button onclick="document.getElementById('notif-panel')?.remove()" class="text-slate-400 hover:text-white text-lg leading-none">✕</button>
      </div>
      <div class="overflow-y-auto flex-1 divide-y divide-slate-50">
        ${logs.length===0
          ? '<div class="p-6 text-center text-slate-400 text-sm">No recent activity</div>'
          : logs.map(l=>`
            <div class="px-4 py-3 hover:bg-slate-50 cursor-pointer transition-colors" ${l.ticketId?`onclick="document.getElementById('notif-panel')?.remove();render('ticket',{ticketId:'${l.ticketId}'})"`:''}>
              <div class="text-xs font-medium text-slate-800">${l.action}</div>
              <div class="text-xs text-slate-400 mt-0.5">${l.by} · ${ago(l.at)}${l.ticketNumber?' · '+l.ticketNumber:''}</div>
            </div>`).join('')}
      </div>
      ${isAdmin()?`<div class="px-4 py-2 border-t border-slate-100 bg-slate-50 flex-shrink-0">
        <a href="#" onclick="document.getElementById('notif-panel')?.remove();render('logs');return false;" class="text-xs text-indigo-500 hover:underline">View full activity log →</a>
      </div>`:''}
    `;
    document.body.appendChild(panel);
    // Close on outside click
    setTimeout(() => document.addEventListener('click', function close(ev) {
      if (!panel.contains(ev.target)) { panel.remove(); document.removeEventListener('click', close); }
    }), 0);
  });
}

function bindPageEvents(page, params) {

  if (page === 'tickets') {
    document.getElementById('btn-filter')?.addEventListener('click', () => {
      render('tickets', {
        search:   document.getElementById('f-search').value,
        status:   document.getElementById('f-status').value,
        priority: document.getElementById('f-priority').value,
      });
    });
    document.getElementById('f-search')?.addEventListener('keydown', e => { if(e.key==='Enter') document.getElementById('btn-filter').click(); });
  }

  if (page === 'new-ticket') {
    document.getElementById('new-ticket-form')?.addEventListener('submit', e => {
      e.preventDefault();
      const t = createTicket({
        title:       document.getElementById('nt-title').value.trim(),
        description: document.getElementById('nt-desc').value.trim(),
        category:    document.getElementById('nt-cat').value,
        priority:    document.getElementById('nt-priority').value,
        assigneeId:  document.getElementById('nt-assignee')?.value || null,
      });
      showToast(`Ticket ${t.number} created successfully`);
      render('ticket', { ticketId: t.id });
    });
  }

  if (page === 'ticket') {
    document.getElementById('btn-comment')?.addEventListener('click', () => {
      const body = document.getElementById('comment-body').value.trim();
      if (!body) { showToast('Comment cannot be empty','error'); return; }
      addComment(params.ticketId, body, false);
      render('ticket', { ticketId: params.ticketId });
    });
    document.getElementById('btn-internal')?.addEventListener('click', () => {
      const body = document.getElementById('comment-body').value.trim();
      if (!body) { showToast('Note cannot be empty','error'); return; }
      addComment(params.ticketId, body, true);
      render('ticket', { ticketId: params.ticketId });
    });
    document.getElementById('btn-update')?.addEventListener('click', async () => {
      const btn = document.getElementById('btn-update');
      btn.textContent = 'Saving…'; btn.disabled = true;
      await updateTicket(params.ticketId, {
        status:     document.getElementById('edit-status').value,
        priority:   document.getElementById('edit-priority').value,
        assigneeId: document.getElementById('edit-assignee').value || null,
      });
      render('ticket', { ticketId: params.ticketId });
      showToast('Ticket updated');
    });
  }

  if (page === 'reports') {
    const now      = new Date();
    const selMonth = parseInt(params.month || now.getMonth()+1);
    const selYear  = parseInt(params.year  || now.getFullYear());

    document.getElementById('btn-rep-filter')?.addEventListener('click', () => {
      render('reports', {
        month: document.getElementById('rep-month').value,
        year:  document.getElementById('rep-year').value,
      });
    });
    document.getElementById('btn-export-csv')?.addEventListener('click', () => {
      const m = parseInt(document.getElementById('rep-month').value);
      const y = parseInt(document.getElementById('rep-year').value);
      const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
      const cats   = getCategories();
      const allU   = getAllUsers();
      const rows   = getTickets().filter(t => {
        const d = new Date(t.createdAt);
        return d.getFullYear()===y && d.getMonth()+1===m;
      }).map(t => {
        const cat      = cats.find(c => c.id === t.category);
        const assignee = allU.find(u => u.id === t.assigneeId);
        const lastH    = (t.history||[]).slice(-1)[0];
        return [
          t.number, t.title,
          STATUS_LABELS[t.status]||t.status, t.priority,
          cat?.name||'', t.requesterName, t.requesterEmail||'',
          assignee?.name||'Unassigned',
          t.createdAt, t.updatedAt, t.resolvedAt||'', t.closedAt||'',
          resTime(t), (t.comments||[]).length,
          lastH ? `${lastH.action} by ${lastH.by} at ${lastH.at}` : ''
        ];
      });
      const headers = ['Ticket No','Title','Status','Priority','Category','Requester','Requester Email','Assigned To','Created At','Updated At','Resolved At','Closed At','Resolution Time','Comment Count','Last Action'];
      exportCSV([headers,...rows], `tickets-${MONTHS[m-1]}-${y}.csv`);
      showToast('CSV exported');
    });
  }

  if (page === 'logs') {
    document.getElementById('btn-export-logs')?.addEventListener('click', () => {
      const logs = Store.get('activityLogs', []).slice().reverse();
      const rows = logs.map(l => [l.at, l.type, l.action, l.ticketNumber||'', l.ticketTitle||'', l.by, l.byRole, l.details||'']);
      const headers = ['Timestamp','Type','Action','Ticket No','Ticket Title','By','Role','Details'];
      exportCSV([headers,...rows], `activity-log-${new Date().toISOString().slice(0,10)}.csv`);
      showToast('Activity log exported');
    });
    document.getElementById('btn-clear-logs')?.addEventListener('click', () => {
      if (!confirm('Clear all activity logs? This cannot be undone.')) return;
      Store.set('activityLogs', []);
      render('logs');
      showToast('Logs cleared', 'warning');
    });
  }

  if (page === 'users') {
    document.getElementById('btn-show-add')?.addEventListener('click', () => {
      document.getElementById('add-user-form').classList.toggle('hidden');
    });
    document.getElementById('btn-cancel-user')?.addEventListener('click', () => {
      document.getElementById('add-user-form').classList.add('hidden');
    });
    document.getElementById('btn-save-user')?.addEventListener('click', () => {
      const name  = document.getElementById('nu-name').value.trim();
      const email = document.getElementById('nu-email').value.trim().toLowerCase();
      const pass  = document.getElementById('nu-pass').value.trim();
      const dept  = document.getElementById('nu-dept').value.trim();
      const role  = document.getElementById('nu-role').value;
      if (!name || !email || !pass) { showToast('Name, email and password are required','error'); return; }
      const users = Store.get('users',[]);
      if (users.find(u => u.email === email)) { showToast('Email already exists','error'); return; }
      users.push({ id: Date.now().toString(), name, email, password: pass, dept, role, active: true, deleted: false });
      Store.set('users', users);
      showToast('User added successfully');
      render('users');
    });
  }
}

// ================================================================
// MOUSE EFFECTS — Rainbow gradient trail + splash (all pages)
// ================================================================
(function() {
  const canvas  = document.getElementById('mouse-canvas');
  const ctx     = canvas.getContext('2d');
  const ring    = document.getElementById('cursor-ring');
  let trails    = [];
  let inactiveTimer = null;
  let fading    = false;
  let globalAlpha = 1;
  let ringX = window.innerWidth/2, ringY = window.innerHeight/2;
  let mouseX = ringX, mouseY = ringY;
  let ringHue = 0;

  function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
  resize();
  window.addEventListener('resize', resize);

  let hue = 0;
  window.addEventListener('mousemove', e => {
    mouseX = e.clientX; mouseY = e.clientY;
    hue = (hue + 3) % 360;
    const isLogin = currentPage === 'login';
    trails.push({
      x: e.clientX, y: e.clientY, h: hue,
      r:     isLogin ? 28 : 16,
      alpha: isLogin ? 0.55 : 0.22,
      born: Date.now()
    });
    if (trails.length > 60) trails.shift();

    fading = false;
    globalAlpha = 1;
    canvas.style.opacity = 1;
    clearTimeout(inactiveTimer);
    inactiveTimer = setTimeout(() => { fading = true; }, 1800);
  });

  // Click splash — works on all pages, subtle on non-login
  window.addEventListener('click', e => {
    const isLogin = currentPage === 'login';
    const colors  = ['#f472b6','#818cf8','#34d399','#fbbf24','#60a5fa','#f87171'];
    const count   = isLogin ? 5 : 3;
    for (let i = 0; i < count; i++) {
      const r    = document.createElement('div');
      const size = (isLogin ? 40 : 22) + i * (isLogin ? 35 : 20);
      r.className = 'splash-ring';
      r.style.cssText = `
        left:${e.clientX}px; top:${e.clientY}px;
        width:${size}px; height:${size}px;
        border-color:${colors[i%colors.length]};
        animation-duration:${0.5+i*0.12}s;
        animation-delay:${i*0.04}s;
        opacity:${isLogin?'1':'0.55'};
      `;
      document.body.appendChild(r);
      setTimeout(() => r.remove(), 900);
    }
  });

  // Animated cursor ring (smooth lag follow)
  function animRing() {
    ringX += (mouseX - ringX) * 0.14;
    ringY += (mouseY - ringY) * 0.14;
    ringHue = (ringHue + 1.2) % 360;
    if (ring) {
      ring.style.left = ringX + 'px';
      ring.style.top  = ringY + 'px';
      ring.style.borderColor = `hsl(${ringHue},80%,60%)`;
      ring.style.opacity = currentPage === 'login' ? '0.85' : '0.45';
    }
    requestAnimationFrame(animRing);
  }
  animRing();

  window.addEventListener('mousedown', () => { if(ring){ring.style.width='16px';ring.style.height='16px';} });
  window.addEventListener('mouseup',   () => { if(ring){ring.style.width='26px';ring.style.height='26px';} });

  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    const isLogin = currentPage === 'login';
    const maxOpacity = isLogin ? 1 : 0.38;

    if (fading) {
      globalAlpha = Math.max(0, globalAlpha - 0.016);
      canvas.style.opacity = Math.min(globalAlpha, maxOpacity);
    } else {
      canvas.style.opacity = Math.min(1, maxOpacity);
    }

    const now = Date.now();
    trails = trails.filter(t => now - t.born < 900);
    trails.forEach(t => {
      const age  = (now - t.born) / 900;
      const r    = t.r * (1 - age * 0.5);
      const a    = t.alpha * (1 - age);
      const grad = ctx.createRadialGradient(t.x, t.y, 0, t.x, t.y, r);
      grad.addColorStop(0,   `hsla(${t.h},100%,65%,${a})`);
      grad.addColorStop(0.5, `hsla(${(t.h+40)%360},100%,60%,${a*0.5})`);
      grad.addColorStop(1,   `hsla(${(t.h+80)%360},100%,55%,0)`);
      ctx.beginPath();
      ctx.arc(t.x, t.y, r, 0, Math.PI*2);
      ctx.fillStyle = grad;
      ctx.fill();
    });
    requestAnimationFrame(draw);
  }
  draw();
})();
